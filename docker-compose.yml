services:
  ghl-mcp:
    build: .
    container_name: ghl-mcp
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    networks:
      - gonet
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
networks:
  gonet:
    external: true
